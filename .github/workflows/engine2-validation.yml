name: Validate Engine 2 Scaffold

on:
  pull_request:
    paths:
      - "engine2/**"
      - ".github/workflows/engine2-validation.yml"
  push:
    branches:
      - main
    paths:
      - "engine2/**"
      - ".github/workflows/engine2-validation.yml"

permissions:
  contents: read

jobs:
  validate-engine2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Engine 2 validation requirements
        run: python -m pip install -r engine2/scaffold-p4/requirements.txt

      - name: Validate Engine 2 scaffold package
        run: python engine2/scaffold-p4/scripts/validate_package.py
