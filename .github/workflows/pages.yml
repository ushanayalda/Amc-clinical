name: Validate AMC Clinical Mastery site

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript
        run: npm run check

      - name: Test case contract
        run: npm test

      - name: Build production artifact
        run: npm run build
        env:
          BUILD_ID: ${{ github.sha }}
          BASE_PATH: /Amc-clinical/

      - name: Verify production artifact
        run: npm run verify:dist

      - name: Confirm branch-published entry files
        run: |
          test -f index.html
          test -f version.json
          grep -q "pattern-13-stable-unstable-chest-pain-v1" index.html
          grep -q "multi-case-optional-reasoning" version.json
