name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript
        run: npm run check

      - name: Build Pages artifact
        run: npm run build
        env:
          BUILD_ID: ${{ github.sha }}
          BASE_PATH: /Amc-clinical/

      - name: Verify Pages artifact
        run: npm run verify:dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-deploy health check
        shell: bash
        env:
          BUILD_ID: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE="https://ushanayalda.github.io/Amc-clinical"

          contains() {
            local haystack="$1"
            local needle="$2"
            [[ "$haystack" == *"$needle"* ]]
          }

          missing() {
            local haystack="$1"
            local needle="$2"
            [[ "$haystack" != *"$needle"* ]]
          }

          fetch() {
            curl -fsSL \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "$1"
          }

          for attempt in {1..12}; do
            ok=true
            version="$(fetch "${BASE}/version.json?health=${BUILD_ID}" || true)"
            for path in "/" "/index.html"; do
              html="$(fetch "${BASE}${path}?health=${BUILD_ID}")" || ok=false
              if [ "${ok}" = true ]; then
                if ! contains "$html" "$BUILD_ID" && ! contains "$html" "branch-shell"; then
                  ok=false
                fi
                contains "$html" "Classic Chest Pain" || ok=false
                contains "$html" "Continue Case 1" || ok=false
                contains "$html" "Cases" || ok=false
                missing "$html" "Map" || ok=false
                missing "$html" "Before the Case" || ok=false
                missing "$html" "Progress" || ok=false
                missing "$html" "Demo progress" || ok=false
                missing "$html" "Case 1 awaiting transfer" || ok=false
                missing "$html" "Tracking not connected yet" || ok=false
                missing "$html" "ready to practise" || ok=false
                if contains "$html" "branch-shell"; then
                  renderer="$(fetch "${BASE}/assets/js/renderers.js?health=${BUILD_ID}")" || ok=false
                  contains "$renderer" "Run complete" || ok=false
                  missing "$renderer" "Due today" || ok=false
                  missing "$renderer" "Weak spots" || ok=false
                  contains "$renderer" "All cases" || ok=false
                  contains "$renderer" "One hint. One line. Back to speaking." || ok=false
                  contains "$renderer" "Back to Hints" || ok=false
                fi
              fi
            done
            if [ "${ok}" = true ] && [ -n "$version" ]; then
              if ! contains "$version" "$BUILD_ID" && ! contains "$version" "branch-shell"; then
                ok=false
              fi
            fi
            if [ "${ok}" = true ]; then
              echo "Pages health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Pages health check failed after waiting for propagation. Check that repository Pages source is set to GitHub Actions, not Deploy from branch."
          exit 1
